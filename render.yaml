services:
  - type: web
    name: honestneeds
    env: node
    plan: free
    # Build with higher memory limit; copy standalone files after build
    buildCommand: NODE_OPTIONS=--max-old-space-size=2048 npm install && NODE_OPTIONS=--max-old-space-size=2048 npm run build && cp -r public .next/standalone/ && cp -r .next/static .next/standalone/.next/
    startCommand: node .next/standalone/server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_OPTIONS
        value: --max-old-space-size=1024
      - key: PORT
        value: '10000'
    routes:
      - path: /
        matchType: prefix
