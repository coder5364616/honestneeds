services:
  - type: web
    name: honestneeds
    env: node
    plan: free
    # Build with explicit memory settings via build.js script
    buildCommand: npm install && npm run build && cp -r public .next/standalone/ 2>/dev/null; cp -r .next/static .next/standalone/.next/ 2>/dev/null; true
    startCommand: node .next/standalone/server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_OPTIONS
        value: --max-old-space-size=1024
      - key: PORT
        value: '10000'
    routes:
      - path: /
        matchType: prefix
