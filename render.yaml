services:
  - type: web
    name: honestneeds
    env: node
    plan: free
    # Pin Node.js to v22 LTS for stability (Node 24 is too bleeding edge)
    nodeVersion: '22'
    # Build with higher memory limit; copy standalone files after build
    buildCommand: NODE_OPTIONS=--max-old-space-size=1536 npm install && NODE_OPTIONS=--max-old-space-size=1536 npm run build && cp -r public .next/standalone/ && cp -r .next/static .next/standalone/.next/
    startCommand: node .next/standalone/server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_OPTIONS
        value: --max-old-space-size=1024
      - key: PORT
        value: '10000'
    routes:
      - path: /
        matchType: prefix
